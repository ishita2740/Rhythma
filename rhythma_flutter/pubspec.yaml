name: rhythma
description: Rhythma — AI-powered multilingual women's health companion for India

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Fonts ──────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Navigation ─────────────────────────────────────────
  go_router: ^13.2.0

  # ── State Management ───────────────────────────────────
  provider: ^6.1.2

  # ── Local Storage (offline-first) ──────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Firebase / Firestore ───────────────────────────────
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.3

  # ── Gemini API ─────────────────────────────────────────
  google_generative_ai: ^0.4.3

  # ── Networking ─────────────────────────────────────────
  http: ^1.2.2
  dio: ^5.4.3+1

  # ── Encryption ─────────────────────────────────────────
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.2

  # ── Charts & Visualisation ─────────────────────────────
  fl_chart: ^0.68.0

  # ── Localisation / i18n ────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # ── Permissions ────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Connectivity ───────────────────────────────────────
  connectivity_plus: ^6.0.3

  # ── Environment variables ──────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── Shared Preferences (lightweight settings) ──────────
  shared_preferences: ^2.3.2

  # ── URL Launcher ───────────────────────────────────────
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  # Fonts loaded via google_fonts package — no local font files needed
